name: Update Citation Counts
 
on:
  schedule:
    - cron: '0 0 1 * *'   # Runs at midnight on the 1st of every month
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab
 
jobs:
  update-citations:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install scholarly
 
      - name: Fetch and update citations
        run: python update_citations.py
        env:
          SCHOLAR_ID: -ThWYkwAAAAJ   # Your Google Scholar user ID
 
      - name: Commit updated README
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "chore: update citation counts [skip ci]")
          git push
 
