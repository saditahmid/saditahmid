Two files to add to your profile repo (saditahmid/saditahmid):

Setup — 3 steps:

Put update_citations.py in the root of the repo (same level as README.md)
Put update_citations.yml in .github/workflows/ (create that folder if it doesn't exist)
Go to Settings → Actions → General and make sure "Allow GitHub Actions to create and approve pull requests" and "Read and write permissions" are enabled under Workflow permissions
That's it. On the 1st of every month GitHub runs the script automatically — it pulls your latest Scholar metrics, patches the badge numbers and the citation column in the table, and commits the change with the message chore: update citation counts.

You can also trigger it manually anytime from the Actions tab → Update Citation Counts → Run workflow.

One caveat: Google Scholar occasionally blocks automated requests. The script handles this gracefully — if it fails, it exits cleanly without breaking anything and just retries next month.


